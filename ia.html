<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MProva - Inteligência Artificial</title>
    <link rel="stylesheet" href="assets/css/style.css"> 
    <style>
        .ia-container { max-width: 600px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
        .chat-window { border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; padding: 15px; }
        .chat-messages { height: 300px; overflow-y: auto; margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 4px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .message { margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .bot-message { background: #e2f0d9; align-self: flex-start; margin-right: auto; }
        .user-message { background: #007bff; color: #fff; align-self: flex-end; margin-left: auto; text-align: left; }
        
        .quick-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .option-btn { background: #fff; border: 1px solid #007bff; color: #007bff; padding: 10px; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; }
        .option-btn:hover { background: #007bff; color: #fff; }
        
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .chat-input-area button { padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Início</a>
            <a href="materials.html">Materiais</a>
            <a href="ia.html" style="font-weight: bold; border-bottom: 2px solid #007bff;">Área da IA</a>
        </nav>
    </header>

    <main class="ia-container">
        <h1>Assistente de Estudos IA</h1>
        <p>Selecione uma das opções prontas abaixo ou digite sua dúvida:</p>
        
        <div class="chat-window">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">Olá! Sou o assistente oficial do MProva. Como posso te ajudar com seus estudos ou navegação hoje?</div>
            </div>
            
            <!-- Botões de opções rápidas -->
            <div class="quick-options" id="quickOptions">
                <button class="option-btn" onclick="selectOption('Gerar meu Plano de Estudos')">📋 Gerar meu Plano de Estudos</button>
                <button class="option-btn" onclick="selectOption('Ver Materiais de Apoio')">📚 Ver Materiais de Apoio disponíveis</button>
                <button class="option-btn" onclick="selectOption('Como funciona o MProva?')">💡 Como usar o MProva?</button>
            </div>
            
            <!-- Campo de input para mensagens livres -->
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Faça uma pergunta sobre o MProva...">
                <button onclick="sendUserMessage()">Enviar</button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');

        // Cria e insere os botões de opções dinamicamente dentro do fluxo do chat
        function mostrarBotoesOpcoes() {
            // Cria o container dos botões
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'quick-options';
            optionsDiv.id = 'currentOptions';
            optionsDiv.style.cssText = 'display: flex; flex-direction: column; gap: 8px; margin: 10px 0; max-width: 80%;';

            // Define os botões estilo WhatsApp
            optionsDiv.innerHTML = `
                <button class="option-btn" onclick="selectOption('📋 Gerar meu Plano de Estudos')">📋 Gerar meu Plano de Estudos</button>
                <button class="option-btn" onclick="selectOption('📚 Ver Materiais de Apoio disponíveis')">📚 Ver Materiais de Apoio disponíveis</button>
                <button class="option-btn" onclick="selectOption('💡 Como usar o MProva?')">💡 Como usar o MProva?</button>
            `;

            chatMessages.appendChild(optionsDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Executa assim que a página carrega para mostrar as opções iniciais no chat
        window.onload = function() {
            setTimeout(mostrarBotoesOpcoes, 500);
        };

        // Função ativada ao clicar em um dos botões do chat
        function selectOption(optionText) {
            // Remove os botões atuais do fluxo para seguir o modelo do print
            const currentOptions = document.getElementById('currentOptions');
            if (currentOptions) currentOptions.remove();
            
            // Envia a escolha do usuário
            appendMessage(optionText, 'user-message');
            
            setTimeout(() => {
                processAIResponse(optionText);
            }, 800);
        }

        // Função de envio de mensagem digitada pelo usuário
        function sendUserMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (text === '') return;

            // Se o usuário digitar algo, remove as opções que estavam abertas
            const currentOptions = document.getElementById('currentOptions');
            if (currentOptions) currentOptions.remove();

            appendMessage(text, 'user-message');
            input.value = '';

            setTimeout(() => {
                processAIResponse(text);
            }, 800);
        }

        // Atalho para enviar com a tecla Enter
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendUserMessage();
        });

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; 
        }

        // RESPOSTA LIMITADA AO ESCOPO DO SITE MPROVA
        function processAIResponse(userInputText) {
            const query = userInputText.toLowerCase();
            let responseText = "";

            // Palavras chaves aceitas pelo site
            const keywordsContext = ['plano', 'estudo', 'material', 'mprova', 'olimpiada', 'apoio', 'ajuda', 'site', 'como funciona', 'cronograma'];
            const isInsideScope = keywordsContext.some(keyword => query.includes(keyword));

            if (!isInsideScope) {
                responseText = "Desculpe, mas sou um assistente focado exclusivamente no ecossistema MProva. Não consigo responder sobre outros assuntos. Como posso te ajudar com seus estudos hoje?";
            } else {
                if (query.includes('plano') || query.includes('cronograma')) {
                    responseText = "Perfeito! Para gerar seu plano personalizado, recomendo focar nas matérias de maior peso. Você pode montar seu cronograma usando nossos guias na aba 'Materiais'.";
                } else if (query.includes('material') || query.includes('apoio') || query.includes('olimpiada')) {
                    responseText = "Você pode acessar todos os nossos materiais de apoio e guias de olimpíadas clicando na opção 'Materiais' no menu superior!";
                } else {
                    responseText = "O MProva é um ambiente desenvolvido para simplificar seus roteiros de estudos de alto nível. Deseja ver os materiais de apoio ou criar um plano?";
                }
            }

            appendMessage(responseText, 'bot-message');
            
            // Após a resposta da IA, gera novos botões de contexto se o usuário quiser continuar navegando
            setTimeout(mostrarBotoesOpcoes, 600);
        }
    </script>
